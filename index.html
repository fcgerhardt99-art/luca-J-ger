<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luca Jäg – Virtual Exhibition</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f7f7f4;
      color: #111;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      z-index: 20;
      mix-blend-mode: difference;
      color: white;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transform: scaleY(1.4);
      transform-origin: top;
    }

    .intro {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #f7f7f4;
      position: relative;
    }

    .intro h1 {
      font-size: clamp(70px, 13vw, 220px);
      font-weight: 500;
      letter-spacing: -0.09em;
      line-height: 0.72;
      transform: scaleY(2.1);
      transform-origin: center;
    }

    .intro p {
      position: absolute;
      bottom: 65px;
      font-size: 24px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.45;
      transform: scaleY(1.5);
    }

    .room {
      min-height: 145vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      background: linear-gradient(#fbfbf8, #e9e9e3);
    }

    .gallery-space {
      width: min(1200px, 90vw);
      height: 720px;
      position: sticky;
      top: 80px;
      transform-style: preserve-3d;
    }

    .back-wall {
      position: absolute;
      inset: 0;
      background: #fafaf7;
      border: 2px solid #e3e3dc;
      box-shadow:
        inset 0 0 120px rgba(0,0,0,0.045),
        0 0 0 1px rgba(255,255,255,0.9);
    }

    .floor {
      position: absolute;
      left: 0;
      bottom: -260px;
      width: 100%;
      height: 360px;
      background: linear-gradient(#ededeb, #d8d8d2);
      transform: rotateX(78deg);
      transform-origin: top;
      border-top: 2px solid #d8d8d0;
      box-shadow: inset 0 35px 90px rgba(0,0,0,0.06);
    }

    .ceiling {
      position: absolute;
      left: 0;
      top: -260px;
      width: 100%;
      height: 360px;
      background: linear-gradient(#ffffff, #efefea);
      transform: rotateX(-78deg);
      transform-origin: bottom;
      border-bottom: 2px solid #ddddd6;
      box-shadow: inset 0 -35px 80px rgba(0,0,0,0.035);
    }

    .side-wall-left,
    .side-wall-right {
      position: absolute;
      top: 0;
      width: 360px;
      height: 100%;
      background: #f3f3ef;
      border: 2px solid #dfdfd7;
      box-shadow: inset 0 0 70px rgba(0,0,0,0.045);
    }

    .side-wall-left {
      left: -360px;
      transform: rotateY(76deg);
      transform-origin: right;
    }

    .side-wall-right {
      right: -360px;
      transform: rotateY(-76deg);
      transform-origin: left;
    }

    .artwork {
      position: absolute;
      background: white;
      padding: 12px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .artwork img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #ddd;
    }

    .main-art {
      width: 360px;
      height: 460px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .main-art:hover {
      transform: translate(-50%, -50%) scale(1.06);
      box-shadow: 0 35px 110px rgba(0,0,0,0.22);
    }

    .left-art {
      width: 220px;
      height: 280px;
      left: 80px;
      top: 210px;
    }

    .right-art {
      width: 220px;
      height: 280px;
      right: 80px;
      top: 210px;
    }

    .left-art:hover,
    .right-art:hover {
      transform: scale(1.06);
      box-shadow: 0 35px 100px rgba(0,0,0,0.22);
    }

    .caption {
      position: absolute;
      bottom: 38px;
      left: 50%;
      transform: translateX(-50%) scaleY(1.4);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    .transition {
      min-height: 85vh;
      background: #f7f7f4;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(46px, 9vw, 150px);
      font-weight: 500;
      letter-spacing: -0.08em;
      line-height: 0.75;
      transform: scaleY(1.8);
      text-transform: uppercase;
    }

    .room.second {
      background: linear-gradient(#f6f6f2, #e1e1db);
    }

    .room.second .back-wall {
      background: #f8f8f4;
      border-color: #d9d9d1;
    }

    .room.second .side-wall-left,
    .room.second .side-wall-right {
      background: #eeeeea;
      border-color: #d4d4ca;
    }

    footer {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      background: #f7f7f4;
    }

    footer h2 {
      font-size: clamp(48px, 8vw, 140px);
      font-weight: 500;
      letter-spacing: -0.08em;
      line-height: 0.75;
      transform: scaleY(1.8);
      margin-bottom: 60px;
    }

    footer a {
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #111;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s ease;
      z-index: 9999;
    }

    #lightbox.active {
      opacity: 1;
      pointer-events: all;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      box-shadow: 0 30px 120px rgba(0,0,0,0.5);
    }

    #lightbox span {
      position: absolute;
      top: 30px;
      right: 40px;
      color: white;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    @media (max-width: 800px) {
      header {
        padding: 20px;
        font-size: 11px;
      }

      .intro h1 {
        font-size: 72px;
        transform: scaleY(1.8);
      }

      .intro p {
        font-size: 16px;
      }

      .gallery-space {
        height: 580px;
      }

      .main-art {
        width: 260px;
        height: 340px;
      }

      .left-art,
      .right-art {
        display: none;
      }
    }
  </style>
</head>

<body>

  <header>
    <div>Luca Jäg</div>
    <div>Virtual Exhibition</div>
  </header>

  <section class="intro">
    <h1>LUCA<br>JÄG</h1>
    <p>Scroll to Enter</p>
  </section>

  <section class="room">
    <div class="gallery-space">
      <div class="back-wall"></div>
      <div class="ceiling"></div>
      <div class="floor"></div>
      <div class="side-wall-left"></div>
      <div class="side-wall-right"></div>

      <div class="artwork main-art">
        <img src="images/artwork-1.jpg" alt="Main artwork">
      </div>

      <div class="artwork left-art">
        <img src="images/artwork-2.jpg" alt="Artwork left">
      </div>

      <div class="artwork right-art">
        <img src="images/artwork-3.jpg" alt="Artwork right">
      </div>

      <div class="caption">Room I — White Hall</div>
    </div>
  </section>

  <section class="transition">
    Next Room
  </section>

  <section class="room second">
    <div class="gallery-space">
      <div class="back-wall"></div>
      <div class="ceiling"></div>
      <div class="floor"></div>
      <div class="side-wall-left"></div>
      <div class="side-wall-right"></div>

      <div class="artwork main-art">
        <img src="images/artwork-4.jpg" alt="Main artwork room two">
      </div>

      <div class="artwork left-art">
        <img src="images/artwork-5.jpg" alt="Artwork left room two">
      </div>

      <div class="artwork right-art">
        <img src="images/artwork-6.jpg" alt="Artwork right room two">
      </div>

      <div class="caption">Room II — Soft Archive</div>
    </div>
  </section>

  <footer>
    <div>
      <h2>End of<br>Exhibition</h2>
      <a href="https://www.instagram.com/luca_jaeg/" target="_blank">Instagram</a>
    </div>
  </footer>

  <div id="lightbox">
    <span>Click anywhere to close</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    const rooms = document.querySelectorAll(".gallery-space");

    window.addEventListener("scroll", () => {
      rooms.forEach(room => {
        const rect = room.getBoundingClientRect();
        const center = window.innerHeight / 2;
        const distance = rect.top - center;
        const rotate = distance * 0.012;

        room.style.transform = `rotateX(${rotate}deg)`;
      });
    });

    const artworks = document.querySelectorAll(".artwork img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    artworks.forEach(img => {
      img.addEventListener("click", () => {
        lightbox.classList.add("active");
        lightboxImg.src = img.src;
      });
    });

    lightbox.addEventListener("click", () => {
      lightbox.classList.remove("active");
      lightboxImg.src = "";
    });
  </script>

</body>
</html>
