<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luca Jäger – Virtual Exhibition</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f7f7f2;
      color: #111;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 24px 34px;
      display: flex;
      justify-content: space-between;
      z-index: 100;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      transform: scaleY(1.45);
      transform-origin: top;
      mix-blend-mode: difference;
      color: white;
      pointer-events: none;
    }

    .intro {
      height: 100vh;
      background: #f7f7f2;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .intro h1 {
      font-size: clamp(64px, 13vw, 230px);
      line-height: 0.68;
      font-weight: 500;
      letter-spacing: -0.095em;
      text-align: center;
      transform: scaleY(2.15);
      transform-origin: center;
    }

    .intro p {
      position: absolute;
      bottom: 60px;
      font-size: 26px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.45;
      transform: scaleY(1.45);
    }

    .gallery-section {
      min-height: 180vh;
      background: linear-gradient(#f7f7f2, #eeeeea);
      position: relative;
    }

    .room {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1400px;
    }

    .room-inner {
      width: min(1180px, 88vw);
      height: min(680px, 74vh);
      position: relative;
      transform-style: preserve-3d;
    }

    .back-wall {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,1), rgba(245,245,240,0.85) 58%, rgba(232,232,224,0.9) 100%);
      border: 2px solid #deded6;
      box-shadow:
        inset 0 0 120px rgba(0,0,0,0.055),
        0 30px 100px rgba(0,0,0,0.08);
    }

    .back-wall::before {
      content: "";
      position: absolute;
      inset: 26px;
      border: 1px solid rgba(160,160,150,0.22);
      pointer-events: none;
    }

    .floor {
      position: absolute;
      left: 0;
      bottom: -210px;
      width: 100%;
      height: 260px;
      background: linear-gradient(to bottom, #e7e7e0, #d5d5cc);
      transform: rotateX(68deg);
      transform-origin: top;
      border-top: 2px solid #d2d2c8;
      box-shadow: inset 0 30px 80px rgba(0,0,0,0.08);
      z-index: 1;
      pointer-events: none;
    }

    .ceiling {
      position: absolute;
      left: 0;
      top: -210px;
      width: 100%;
      height: 260px;
      background: linear-gradient(to top, #f1f1eb, #ffffff);
      transform: rotateX(-68deg);
      transform-origin: bottom;
      border-bottom: 2px solid #d8d8cf;
      z-index: 1;
      pointer-events: none;
    }

    .left-wall,
    .right-wall {
      position: absolute;
      top: 0;
      width: 280px;
      height: 100%;
      background: #eeeee8;
      border: 2px solid #d8d8cf;
      box-shadow: inset 0 0 70px rgba(0,0,0,0.055);
      z-index: 1;
      pointer-events: none;
    }

    .left-wall {
      left: -280px;
      transform: rotateY(72deg);
      transform-origin: right;
    }

    .right-wall {
      right: -280px;
      transform: rotateY(-72deg);
      transform-origin: left;
    }

    .artwork {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(680px, 62vw);
      height: min(455px, 48vh);
      transform: translate(-50%, -50%);
      background: #ffffff;
      padding: 14px;
      box-shadow:
        0 26px 80px rgba(0,0,0,0.18),
        0 0 0 1px rgba(0,0,0,0.05);
      z-index: 5;
      cursor: pointer;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .artwork:hover {
      transform: translate(-50%, -50%) scale(1.035);
      box-shadow:
        0 38px 120px rgba(0,0,0,0.24),
        0 0 0 1px rgba(0,0,0,0.06);
    }

    .artwork img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #ddd;
    }

    .room-title {
      position: absolute;
      left: 50%;
      bottom: 54px;
      transform: translateX(-50%) scaleY(1.35);
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.48;
      z-index: 10;
      white-space: nowrap;
    }

    .transition {
      min-height: 100vh;
      background: #f7f7f2;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(64px, 13vw, 220px);
      font-weight: 500;
      letter-spacing: -0.095em;
      line-height: 0.68;
      text-transform: uppercase;
      transform: scaleY(2.05);
      transform-origin: center;
      overflow: hidden;
    }

    .gallery-section.second {
      background: linear-gradient(#f7f7f2, #e8e8e2);
    }

    .gallery-section.second .back-wall {
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,252,1), rgba(241,241,236,0.9) 58%, rgba(222,222,214,0.95) 100%);
      border-color: #d5d5ca;
    }

    .gallery-section.second .artwork {
      width: min(540px, 54vw);
      height: min(640px, 62vh);
    }

    .end {
      min-height: 100vh;
      background: #f7f7f2;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .end h2 {
      font-size: clamp(54px, 10vw, 180px);
      font-weight: 500;
      line-height: 0.68;
      letter-spacing: -0.09em;
      transform: scaleY(1.95);
      margin-bottom: 70px;
    }

    .end a {
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #111;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      z-index: 9999;
      padding: 30px;
    }

    #lightbox.active {
      opacity: 1;
      pointer-events: all;
    }

    #lightbox img {
      max-width: 92vw;
      max-height: 88vh;
      box-shadow: 0 30px 140px rgba(0,0,0,0.55);
    }

    #lightbox span {
      position: absolute;
      top: 28px;
      right: 36px;
      color: white;
      opacity: 0.65;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 800px) {
      header {
        padding: 18px 20px;
        font-size: 11px;
      }

      .intro h1 {
        font-size: 68px;
        transform: scaleY(1.8);
      }

      .intro p {
        font-size: 16px;
      }

      .room-inner {
        width: 92vw;
        height: 64vh;
      }

      .artwork {
        width: 78vw;
        height: 45vh;
      }

      .gallery-section.second .artwork {
        width: 68vw;
        height: 50vh;
      }

      .left-wall,
      .right-wall {
        width: 160px;
      }

      .left-wall {
        left: -160px;
      }

      .right-wall {
        right: -160px;
      }

      .transition {
        font-size: 72px;
        transform: scaleY(1.75);
      }
    }
  </style>
</head>

<body>

  <header>
    <div>Luca Jäger</div>
    <div>Virtual Exhibition</div>
  </header>

  <section class="intro">
    <h1>LUCA<br>JÄGER</h1>
    <p>Scroll to Enter</p>
  </section>

  <section class="gallery-section">
    <div class="room">
      <div class="room-inner">
        <div class="back-wall"></div>
        <div class="ceiling"></div>
        <div class="floor"></div>
        <div class="left-wall"></div>
        <div class="right-wall"></div>

        <div class="artwork">
          <img src="https://res.cloudinary.com/dmlbwubvc/image/upload/v1781306772/Screenshot_2026-06-13_011917_f97ibb.png" alt="Artwork by Luca Jäger">
        </div>

        <div class="room-title">Room I — White Hall</div>
      </div>
    </div>
  </section>

  <section class="transition">
    Room II
  </section>

  <section class="gallery-section second">
    <div class="room">
      <div class="room-inner">
        <div class="back-wall"></div>
        <div class="ceiling"></div>
        <div class="floor"></div>
        <div class="left-wall"></div>
        <div class="right-wall"></div>

        <div class="artwork">
          <img src="images/artwork-2.jpg" alt="Artwork by Luca Jäger">
        </div>

        <div class="room-title">Room II — Soft Archive</div>
      </div>
    </div>
  </section>

  <section class="transition">
    End
  </section>

  <section class="end">
    <div>
      <h2>End of<br>Exhibition</h2>
      <a href="https://www.instagram.com/luca_jaeg/" target="_blank">Instagram</a>
    </div>
  </section>

  <div id="lightbox">
    <span>Click anywhere to close</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    const artworks = document.querySelectorAll(".artwork img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    artworks.forEach(img => {
      img.addEventListener("click", () => {
        lightbox.classList.add("active");
        lightboxImg.src = img.src;
      });
    });

    lightbox.addEventListener("click", () => {
      lightbox.classList.remove("active");
      lightboxImg.src = "";
    });
  </script>

</body>
</html>
